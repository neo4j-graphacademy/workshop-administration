services:
  neo4j:
    image: neo4j:2026.05.0-enterprise
    container_name: neo4j-training
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4jpassword
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=eval
      - NEO4J_server_directories_import=/import
      - NEO4J_server_memory_heap_initial__size=5100m
      - NEO4J_server_memory_heap_max__size=5100m
      - NEO4J_server_memory_pagecache_size=6800m
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./import:/import
    networks:
      - neo4j

networks:
  neo4j:
