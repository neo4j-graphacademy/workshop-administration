services:
  neo4j:
    image: neo4j:2026.05.0-enterprise
    container_name: neo4j-training-issue-slow
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4jpassword
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=eval
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_db_logs_query_enabled=INFO
      # the query log threshold has been set high, so slower queries
      # are not recorded and cannot be diagnosed from the logs
      - NEO4J_db_logs_query_threshold=10s
    volumes:
      - ../../data:/data
      - ../../logs:/logs
    networks:
      - neo4j

networks:
  neo4j:
