services:
  neo4j:
    image: neo4j:2026.05.0-enterprise
    container_name: neo4j-training-issue-challenge
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4jpassword
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=eval
      # set to read-only for maintenance, remove after.
      - NEO4J_server_databases_default__to__read__only=true
    volumes:
      - ../../data:/data
      - ../../logs:/logs
    networks:
      - neo4j

networks:
  neo4j:
