services:
  neo4j:
    image: neo4j:2026.05.0-enterprise
    container_name: neo4j-training-issue-config
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4jpassword
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=eval
      - NEO4J_server_memory_heap_initial__size=50m
      - NEO4J_server_memory_heap_max__size=50m
      - NEO4J_server_memory_pagecache_size=60m
    # keep container alive to allow you to diagnose the issue.
    entrypoint:
      - "/bin/bash"
      - "-c"
      - "/startup/docker-entrypoint.sh neo4j; echo 'neo4j exited - keeping container alive for diagnosis'; tail -f /dev/null"
    networks:
      - neo4j

networks:
  neo4j:
