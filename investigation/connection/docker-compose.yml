services:
  neo4j:
    image: neo4j:2026.05.0-enterprise
    container_name: neo4j-training-issue-connection
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4jpassword
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=eval
      # a security change has restricted Bolt to the loopback interface,
      # so the container's mapped port can no longer reach it
      - NEO4J_server_bolt_listen__address=0.0.0.0:7687
    networks:
      - neo4j

networks:
  neo4j:
