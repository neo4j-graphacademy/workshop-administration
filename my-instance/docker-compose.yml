# Create your own instance using this docker-compose.yml file.
services:
  neo4j:
    image: neo4j:2026.05.0-enterprise
    container_name: neo4j-my-instance
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4jpassword
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=eval
    networks:
      - neo4j

networks:
  neo4j:
